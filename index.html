<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ CoffeeCalculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B4513;
            --secondary: #F4A460;
            --accent: #FFD700;
            --light: #F5F5DC;
            --dark: #2F2F2F;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Brush Script MT', 'Brush Script Std', 'Apple Chancery', cursive, sans-serif;
        }
        
        body {
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 2.5rem;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .control-group {
            background: rgba(139, 69, 19, 0.05);
            border-radius: 15px;
            padding: 1.2rem;
            border: 2px dashed var(--secondary);
        }
        
        .control-group h3 {
            margin-bottom: 0.8rem;
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            margin-bottom: 0.5rem;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            background: white;
            margin-bottom: 0.5rem;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }
        
        .strength-emoji-selector {
            display: flex;
            justify-content: space-around;
            margin: 0.5rem 0;
        }
        
        .strength-emoji-btn {
            font-size: 2rem;
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 50%;
        }
        
        .strength-emoji-btn:hover {
            transform: scale(1.2);
        }
        
        .strength-emoji-btn.active {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        .strength-label-large {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            margin-top: 0.5rem;
            padding: 0.8rem;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            border: 2px dashed var(--primary);
        }
        
        .strength-hint {
            font-size: 0.9rem;
            text-align: center;
            margin-top: 0.3rem;
            color: var(--primary);
            font-style: italic;
        }
        
        .method-radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .method-radio-label {
            display: flex;
            align-items: center;
            position: relative;
            padding: 0.8rem 1rem;
            background: white;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            min-height: 44px;
        }
        
        .method-radio-label:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }
        
        .method-radio-label:has(input:checked) {
            border-color: var(--primary);
        }
        
        .method-radio-label input:checked + .method-radio-box {
            background: var(--primary);
            border-color: var(--primary);
        }

        .method-radio-label input:checked + .method-radio-box::after {
            opacity: 1;
            transform: scale(1);
            background: white;
        }

        .method-radio-label input:checked ~ .method-text {
            font-weight: bold;
            color: var(--primary);
        }
        
        .method-radio-label input:checked {
            outline: 2px solid var(--primary);
        }

        .method-radio-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .method-radio-box {
            width: 20px;
            height: 20px;
            border: 2px solid var(--secondary);
            border-radius: 50%;
            margin-right: 1rem;
            background: white;
            position: relative;
            transition: all 0.3s;
        }
        
        .method-radio-box::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            transition: all 0.3s;
        }
        
        .method-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--dark);
            transition: all 0.3s;
            line-height: 1;
            margin: 0;
            padding: 0;
        }
        
        .results {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            border: 2px dashed var(--accent);
            text-align: center;
        }
        
        .result-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 1rem 0;
        }
        
        .coffee-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        
        button:hover {
            background: var(--accent);
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
        
        .footer {
            text-align: center;
            color: var(--secondary);
            font-style: italic;
            margin-top: 1rem;
        }
        
        @media (max-width: 480px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ CoffeeCalculator</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>📝 Method</h3>
                <div class="method-radio-group">
                    <label class="method-radio-label">
                        <input type="radio" name="method" value="drip" checked>
                        <span class="method-radio-box"></span>
                        <span class="method-text">Drip Coffee</span>
                    </label>
                    <label class="method-radio-label">
                        <input type="radio" name="method" value="french-press">
                        <span class="method-radio-box"></span>
                        <span class="method-text">French Press</span>
                    </label>
                    <label class="method-radio-label">
                        <input type="radio" name="method" value="turkish">
                        <span class="method-radio-box"></span>
                        <span class="method-text">Turkish Coffee</span>
                    </label>
                </div>
            </div>
            
            <div class="control-group">
                <h3>⚡ Coffee Strength</h3>
                <div class="strength-emoji-selector">
                    <button class="strength-emoji-btn" data-value="light">🐹</button>
                    <button class="strength-emoji-btn active" data-value="sweet">🐱</button>
                    <button class="strength-emoji-btn" data-value="strong">🦁</button>
                </div>
                <div id="strength-label" class="strength-label-large">🐱 Medium Strength (13.9ml/g)</div>
                <div class="strength-hint">Tap an animal to change strength level</div>
            </div>
            
            <div class="control-group">
                <h3>⚖️ Coffee (g)</h3>
                <input type="number" id="coffee-grams" value="30" min="1" step="1">
            </div>
            
            <div class="control-group">
                <h3>💧 Water (ml)</h3>
                <input type="number" id="water-ml" value="460" min="1" step="1">
            </div>
        </div>
        

        
        <div class="results">
            <div class="coffee-icon">☕</div>
            <div id="result-ratio" class="result-value">15.33 ml/g</div>
            <div id="result-description">Perfect sweet spot ratio!</div>
        </div>
        
        <div class="footer">
            <p>For when your neurons are still asleep 🥱</p>
        </div>
    </div>
    
    <script>
        // Strength multipliers by method
        const methodMultipliers = {
            'drip': {
                'light': 13.33,
                'sweet': 13.9,
                'strong': 14.47
            },
            'french-press': {
                'light': 13.33,
                'sweet': 13.9,
                'strong': 14.47
            },
            'turkish': {
                'light': 13.33,
                'sweet': 13.9,
                'strong': 14.47
            }
        };
        
        // DOM elements
        const methodRadios = document.querySelectorAll('input[name="method"]');
        const strengthDots = document.querySelectorAll('.strength-dot');
        const strengthLabel = document.getElementById('strength-label');
        const coffeeGramsInput = document.getElementById('coffee-grams');
        const waterMlInput = document.getElementById('water-ml');

        const resultRatio = document.getElementById('result-ratio');
        const resultDescription = document.getElementById('result-description');
        
        let currentStrength = 'sweet';
        
        // Strength emoji button click handlers
        const strengthEmojiBtns = document.querySelectorAll('.strength-emoji-btn');
        strengthEmojiBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                strengthEmojiBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStrength = btn.getAttribute('data-value');
                
                // Update label
                const labels = {
                    'light': '🐹 Light Strength - 13.33ml/g (gentle)',
                    'sweet': '🐱 Medium Strength - 13.9ml/g (balanced)',
                    'strong': '🦁 Strong Strength - 14.47ml/g (intense) 🔥'
                };
                strengthLabel.textContent = labels[currentStrength];
                
                calculateRatio();
            });
        });
        
        // Input change handlers
        coffeeGramsInput.addEventListener('input', calculateRatio);
        waterMlInput.addEventListener('input', calculateRatio);
        
        // Method change handler - show/hide appropriate inputs
        methodRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                const selectedMethod = document.querySelector('input[name="method"]:checked').value;
                
                if (selectedMethod === 'drip') {
                    // For drip: show coffee input, hide water input
                    coffeeGramsInput.parentElement.style.display = 'block';
                    waterMlInput.parentElement.style.display = 'none';
                } else {
                    // For French Press/Turkish: show water input, hide coffee input
                    coffeeGramsInput.parentElement.style.display = 'none';
                    waterMlInput.parentElement.style.display = 'block';
                }
                
                calculateRatio();
            });
        });
        
        // Initialize - hide water input for drip (default)
        document.addEventListener('DOMContentLoaded', () => {
            const coffeeGroup = coffeeGramsInput.parentElement;
            const waterGroup = waterMlInput.parentElement;
            
            if (document.querySelector('input[name="method"]:checked').value === 'drip') {
                coffeeGroup.style.display = 'block';
                waterGroup.style.display = 'none';
            } else {
                coffeeGroup.style.display = 'none';
                waterGroup.style.display = 'block';
            }
        });

        
        function calculateRatio() {
            const selectedMethod = document.querySelector('input[name="method"]:checked').value;
            const targetRatio = methodMultipliers[selectedMethod][currentStrength];
            
            if (selectedMethod === 'drip') {
                // For drip: use coffee input, calculate water needed
                const coffee = parseFloat(coffeeGramsInput.value) || 0;
                
                if (coffee <= 0) {
                    resultRatio.textContent = '💧 0 ml';
                    resultDescription.textContent = 'Please enter coffee amount';
                    return;
                }
                
                const targetWater = coffee * targetRatio;
                resultRatio.textContent = `💧 ${targetWater.toFixed(0)} ml`;
                resultDescription.textContent = `Use ${targetWater.toFixed(0)}ml water 💧 for ${coffee}g coffee beans 🫘 (ratio: ${targetRatio.toFixed(2)}ml/g)`;
            } else {
                // For French Press and Turkish: use water input, calculate coffee needed
                const water = parseFloat(waterMlInput.value) || 0;
                
                if (water <= 0) {
                    resultRatio.textContent = '🫘 0 g';
                    resultDescription.textContent = 'Please enter water amount';
                    return;
                }
                
                const targetCoffee = water / targetRatio;
                resultRatio.textContent = `🫘 ${targetCoffee.toFixed(1)} g`;
                resultDescription.textContent = `Use ${targetCoffee.toFixed(1)}g coffee beans 🫘 for ${water}ml water 💧 (ratio: ${targetRatio.toFixed(2)}ml/g)`;
            }
        }
        
        // Initial calculation
        calculateRatio();
    </script>
</body>
</html>
